services:
  web-app:
    build: .
    ports:
      - "${PORT}:${PORT}"
    environment:
      - MONGO_URI=mongodb://${MONGODB_DOCKER_USERNAME}:${MONGODB_DOCKER_PASSWORD}@mongodb:27017/your_db?authSource=admin
    depends_on:
      - mongodb
    networks:
      - mongo_network

  mongodb:
    image: mongo:7.0
    container_name: mongodb_container
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGODB_DOCKER_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_DOCKER_PASSWORD}
    volumes:
      - mongo_data:/data/db
    networks:
      - mongo_network

  mongo-express:
    image: mongo-express:latest
    container_name: mongo_express_container
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGODB_DOCKER_USERNAME}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGODB_DOCKER_PASSWORD}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGODB_DOCKER_USERNAME}:${MONGODB_DOCKER_PASSWORD}@mongodb:27017/?authSource=admin
      ME_CONFIG_BASICAUTH_USERNAME: webuser
      ME_CONFIG_BASICAUTH_PASSWORD: webpassword
    depends_on:
      - mongodb
    networks:
      - mongo_network

volumes:
  mongo_data:

networks:
  mongo_network:
    driver: bridge